name: Compile Shiritori App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Delete existing release and tag
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete latest --yes || true
        git push origin :refs/tags/latest || true

    - name: Create release with pre-built assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create latest \
          --title "Latest Build" \
          --notes "Auto-built from latest commit on main." \
          "shiritori bot/dist/shiritori_bot.exe" \
          "shiritori_android_studio/app/build/outputs/apk/debug/app-debug.apk"

  build:
    name: Build for ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system deps (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get install -y python3-tk

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter

    - name: Build with PyInstaller (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --onedir --windowed \
          --collect-all customtkinter \
          --add-data "shiritori net/words_dictionary.json:." \
          "shiritori net/shiritori_net.py"

    - name: Create DMG (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        hdiutil create \
          -volname "Shiritori" \
          -srcfolder dist/shiritori_net.app \
          -ov -format UDZO \
          dist/shiritori_net.dmg

    - name: Upload DMG to release (Mac)
      if: matrix.os == 'macos-latest'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release upload latest dist/shiritori_net.dmg

    - name: Build with PyInstaller (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile --windowed \
          --collect-all customtkinter \
          --add-data "shiritori net/words_dictionary.json:." \
          "shiritori net/shiritori_net.py"

    - name: Upload binary to release (Linux)
      if: matrix.os == 'ubuntu-latest'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release upload latest dist/shiritori_net
